# Formal 验证工作流配置文件
ex_tools:
  - "examples.Formal.scripts.formal_tools.GenerateChecker"
  - "examples.Formal.scripts.formal_tools.GenerateFormalScript"

template_overwrite:
  DOC_GEN_LANG: "中文"
  RTL_PATH: "{DUT}"
  FILE_PATH: "output/{DUT}"
# 禁止直接修改DUT目录下的任何文件
un_write_dirs:
  - "{DUT}/"
  - "Guide_Doc/"
# 不使用预定义模板
template: ""
# TUI界面配置
tui:
  task_width: 50
  console_height: 19
  status_height: 10
hooks:
  # Define any hook prompts here if needed
  continue: >
    你还没有完成所有任务，请继续。请通过Check和Complete工具来判断你是否完成了当前阶段的任务。 请认真分析Check和Complete工具的返回结果，并根据反馈调整你的工作，直到所有Check和Complete都通过为止。

  cagent_init: >
    请通过工具RoleInfo获取你的角色信息和基本指导，然后完成任务。请使用工具ReadTextFile读取文件。

mission:
  name: "{DUT} 形式化验证任务"
  prompt:
    system: |
      你是一名顶尖的形式化验证架构师。你的目标不仅是发现 Bug，更是通过数学证明确保设计的完备性。
      你具备深厚的硬件设计理解能力，精通 SystemVerilog Assertions (SVA) 和形式化验证工具。
      你非常优秀，能发现验证中的所有bug和潜在隐患，能基于源代码进行bug详细分析并给出修复建议。
      你不惧怕测试用例Fail，因为Fail可能意味着bug，这是发现{DUT}中bug的基础。
      **核心技术栈：**
        - 符号化索引 (Symbolic Indexing): 必须使用 fv_idx 处理阵列存储，断言单点修改稳定性。
        - 活性证明 (Liveness): 必须验证 No-Starvation，确保设计不会死锁。
        - 覆盖率驱动 (Reachability): 必须为关键状态（Full, Empty, Hit）编写 Cover 属性。
      **工作原则：**
          - 拒绝无效证明：任何显示为 TRIVIALLY_TRUE 的属性都意味着环境有缺陷，必须修正约束。
          - 白盒思维：必须进入 RTL 内部提取指针、状态机和标志位。
          - 协议严谨：必须对所有 Valid-Ready 接口施加稳定性 Assume 约束以优化证明速度。
      **符号化验证最佳实践：**
          - 如果设计使用 fv_idx 符号化索引，必须添加三个强制约束：
              1. M_CK_FV_IDX_STABLE: assume property(@(posedge clk) disable iff(!rst_n) $stable(fv_idx));
              2. M_CK_FV_IDX_VALID:  assume property(@(posedge clk) fv_idx < NUM_PORTS);  // 不使用 disable iff
              3. M_CK_FV_IDX_KNOWN:  assume property(@(posedge clk) !$isunknown(fv_idx));
          - 这三个约束是防止假阳性 Bug 报告的关键，缺失会导致索引漂移和越界访问。
          - 参考 Guide_Doc/dut_property_template.md 中的详细说明和模板。
      你精通 SVA 高级用法（s_eventually, $stable, $past），能通过精妙的断言捕捉深层逻辑错误。
      **注意：**
      - 请注意Complete和Check工具进行阶段检查时的区别：
      - - Check工具仅仅进行阶段检查，不会推进阶段
      - - Complete工具进行阶段检查后，如果通过检查后，推进到下一个阶段
      - - 建议优先使用Complete工具（阶段推进总耗时时间更短），必要时使用Check工具进行阶段检查
      - 需要根据Complete（或者Check）的结果调整你的工作，目标是保证所有Complete都通过
      - 完成一个Stage后，再进入下一个Stage，直到所有Stage都完成，才算整个验证任务完成
      - 除非Complete工具（或者Check工具）要求等待人工确认，否则不需要人工介入，不需要询问任何问题
      - 非必要情况下，不要尝试获取{DUT}的内部信号状态，除非Complete工具（或者Check工具）要求你这么做
      - 你要通过{DUT}的输入输出端口去验证其功能，而不是通过内部信号状态去验证，更不要尝试验证其内部子模块的功能
      - 在计划通过Complete工具推进到下一个阶段前，需要通过工具SetCurrentStageJournal进行阶段日志记录，方便后续追踪和分析
      - 如果不是从第一阶段开始工作，你需要：
      -   通过CurrentTips工具获取当前阶段的具体任务指导
      -   通过Status工具获取当前阶段状态，确认你处于哪个阶段
      -   通过AllStageJournal工具获取之前阶段的日志，了解之前阶段的工作内容和结果
              现在调用`CurrentTips`，开启你的验证工作！
mcp_server:
  init_prompt: >
    请通过工具`RoleInfo`获取你的角色信息和基本指导，然后完成任务。请使用工具`ReadTextFile`读取文件。

stage:
  - name: requirement_analysis_and_planning
    desc: "需求分析与验证规划"
    task:
      - "第1步：研读{DUT}的设计规格文档（如README.md），初步评估设计的复杂度和功能。"
      - "第2步：分析设计，识别适合应用形式化验证的关键模块和功能点（例如，状态机、仲裁器、数据通路、关键算法）。"
      - "第3步：定义形式化验证的范围和目标，明确哪些部分将通过形式化验证，哪些部分可能需要其他验证方法（如仿真）。"
      - "第4步：识别潜在的复杂性挑战，如大规模状态空间、复杂的算术运算或未约束的输入，并初步构思应对策略。"
      - "第5步：编写一份详细的形式化验证规划文档`{OUT}/01_{DUT}_verification_needs_and_plan.md`，请使用{DOC_GEN_LANG}编写，概述验证范围、关键目标、假设条件和预期交付成果。"
      - "第6步：在规划中强调，目标是发现设计缺陷。属性失败（Fail）是通往更高设计质量的路径，需要深入分析反例（Counterexample）。"
    reference_files:
      - "{DUT}/README.md"
    checker:
          - name: markdown_file_check
            clss: "UnityChipCheckerMarkdownFileFormat"
            args:
              markdown_file_list: "{OUT}/01_{DUT}_verification_needs_and_plan.md"
              no_line_break: true

  - name: dut_function_understanding
    desc: "{DUT}功能理解"
    task:
      - "第1步：通读{DUT}的RTL代码（例如{RTL_PATH}/*.v, {RTL_PATH}/*.sv）和设计文档，建立对设计功能的宏观理解。"
      - "第2步：详细分析{DUT}的接口信号，包括时钟、复位、输入、输出和双向端口，并理解每个信号的精确时序和功能含义。"
      - "第3步：识别设计中的核心组成部分，如状态机（State Machines）、数据通路（Datapaths）、存储器（Memories）和控制逻辑（Control Logic）。"
      - "第4步：确定设计的时钟域和复位策略。是单时钟还是多时钟设计？同步复位还是异步复位？这对形式化环境配置至关重要。"
      - "第5步：分析设计中的关键参数和配置模式，这些可能会影响需要验证的功能。"
      - "第6步：将以上分析结果整理成`{OUT}/02_{DUT}_basic_info.md`，请使用{DOC_GEN_LANG}编写，重点突出接口定义、关键模块和时钟/复位方案，作为后续属性定义的依据。"
    reference_files:
      - "{DUT}/README.md"
      - "{RTL_PATH}/*.v"
      - "{RTL_PATH}/*.sv"
    checker:
          - name: markdown_file_check
            clss: "UnityChipCheckerMarkdownFileFormat"
            args:
              markdown_file_list: "{OUT}/02_{DUT}_basic_info.md"
              no_line_break: true

  - name: functional_specification_analysis
    desc: "功能规格分析与形式化策略定义"
    task:
      - "目标：将{DUT}的宏观功能规格分解为可形式化的微观规格（Micro-specifications），并定义验证策略，为编写SVA属性和验证脚本奠定基础。"
      - "第1步：基于功能理解阶段的成果，系统性地梳理所有需要验证的功能。参考{OUT}/02_{DUT}_basic_info.md。"
      - "第2步：将功能点归类到功能组（<FG-功能组名>），例如<FG-FSM>状态机行为, <FG-INTERFACE>接口协议, <FG-DATAPATH>数据通路逻辑。"
      - "第3步：在每个功能组内，定义具体的功能规格（<FC-规格名>），描述一个特定的设计行为或时序关系。"
      - "第4步：为每个功能规格，设计具体的检测点（<CK-检测点名>），并**必须强制标注其属性风格**（如：(Style: Comb), (Style: Seq)），明确其意图是 `assert` (检查), `assume` (环境假设), 还是 `cover` (覆盖)。"
      - "第5步：根据设计特点和验证目标，确定形式化验证策略。这应包括关键的时钟/复位配置方案、对复杂模块（如大型乘法器）的抽象/替换策略、以及推荐的验证引擎（如BMC, PDR）。"
      - "第6步：将以上所有分析结果写入`{OUT}/03_{DUT}_functions_and_checks.md`。确保文档中每一个 CK 标签后都带有明确的 Style 标注，这将作为生成 SVA 代码的唯一指令集。"
      - "重要提示：这是形式化验证的核心。一个带有精确 Style 标注的功能分解文档，是生成高质量、无歧义 SVA 的关键。请严格参考`Guide_Doc/dut_functions_and_checks.md`。 "
    reference_files:
      - "Guide_Doc/dut_functions_and_checks.md"
      - "{DUT}/*.md"
      - "{OUT}/02_{DUT}_basic_info.md"
      - "{OUT}/01_{DUT}_verification_needs_and_plan.md"
    output_files:
      - "{OUT}/03_{DUT}_functions_and_checks.md"
    stage:
      - name: dut_function_grouping
        desc: "DUT功能分组与层次划分{COUNT_FG}"
        task:
          - "基于{DUT}的设计结构和功能，将待验证的行为划分到不同的逻辑分组中。例如：<FG-FSM_CTRL>, <FG-AXI_PROTOCOL>, <FG-FIFO_LOGIC>。必须包含<FG-ENVIRONMENT>用于定义环境假设。"
        checker:
          - name: group_structure_check
            clss: "UnityChipCheckerLabelStructure"
            args:
              doc_file: "{OUT}/03_{DUT}_functions_and_checks.md"
              leaf_node: "FG"
      - name: function_point_definition
        desc: "具体功能点识别与定义{COUNT_FC}"
        task:
          - "在每个分组内，精确定义需要验证的设计意图（Design Intent）。每个<FC-功能点>应描述一个无歧义的行为规则。例如，在<FG-AXI_PROTOCOL>组内，可以有<FC-AWREADY_ASSERTION>。"
        checker:
          - name: function_point_check
            clss: "UnityChipCheckerLabelStructure"
            args:
              doc_file: "{OUT}/03_{DUT}_functions_and_checks.md"
              leaf_node: "FC"
      - name: check_point_design
        desc: "检测点设计与定义{COUNT_CK}"
        task:
          - "为每个功能点设计具体的属性检查点（<CK_检查点>）。"
          - "**强制要求**：每个标签后必须紧跟属性风格标注，例如：`<CK_ADD_BASIC> (Style: Comb)`。"
          - "**形式化完备性要求**：在设计检测点时，必须包含以下三类高级模式（参考 Guide_Doc/dut_functions_and_checks.md）："
          - "  1. **稳定性检查 (Stability)**: 为所有存储/状态条目设计单点修改保证检测点（使用 fv_idx）。"
          - "  2. **可达性覆盖 (Reachability)**: 为 Full, Empty, Hit 等关键标志位设计 Cover 检测点，防止证明无效。"
          - "  3. **活性验证 (Liveness)**: 为所有请求-响应通路设计 No-Starvation 检测点。"
          - "明确该检查点是安全性属性（Safety）、活性属性（Liveness）还是覆盖属性（Cover），并简要描述其逻辑。"
          - "标签独立成行，与标题用空行分隔。"
          - "列出的检查点必须具有可测试性，即能通过端口的输入输出进行验证。"
        checker:
          - name: check_point_check
            clss: "UnityChipCheckerLabelStructure"
            args:
              doc_file: "{OUT}/03_{DUT}_functions_and_checks.md"
              leaf_node: "FC"
              data_key: "COVER_GROUP_DOC_CK_LIST"
        need_human_check: $(HUMAN_CHECK_CK: false) # 验证复杂DUT时建议开启该人工检查
  - name: environment_generation
    desc: "验证环境生成 (Checker & Bind)"
    task:
      - "第1步：使用 `GenerateChecker` 工具生成验证环境。在本阶段只需要生成验证环境，请不要生成具体的SVA代码。工具参数说明："
      - "  - `dut_name`: 必须使用 `{DUT}` 作为模块名称"
      - "  - `output_file`: 必须使用 `{OUT}/tests/{DUT}`，会生成 {OUT}/tests/{DUT}_checker.sv 和 {OUT}/tests/{DUT}_wrapper.sv"
      - "  - `rtl_dir`: RTL源码所在目录，使用 `{FILE_PATH}`"
      - "  **调用方式**：GenerateChecker(dut_name=\"{DUT}\", output_file=\"{OUT}/tests/{DUT}\", rtl_dir=\"{FILE_PATH}\")"
      - "第2步：**关键 - 完善符号化索引 (Symbolic Indexing) 逻辑**：打开生成的 `{OUT}/tests/{DUT}_wrapper.sv`。如果设计包含数组或多个重复条目（如 entries_0, entries_1），`GenerateChecker` 会自动生成 `fv_idx` 和 `fv_mon_...` 的占加符。你必须根据 RTL 的内部信号路径取消注释并补全这些 Mux 逻辑，确保 `fv_mon_...` 正确映射。"
      - "第3步：**白盒信号引出**：在 wrapper 中引出规划文档要求的所有关键内部信号（如指针、状态机、Flag）。"
      - "第4步：**时序校正**：检查 RTL 是否包含时钟和复位信号。如果名称不标准（如不是 clk, rst_n），在 wrapper 中进行重命名映射。如果 RTL 是纯组合逻辑，必须在 wrapper 端口添加 `input clk, input rst_n` 用于断言采样。"
      - "第5步：检查生成的代码，确保其符合规格且无语法错误。"
    reference_files:
      - "{OUT}/02_{DUT}_basic_info.md"
      - "SpecDoc/dut_env_template.md"
    output_files:
      - "{OUT}/tests/{DUT}_checker.sv"
    checker:
      - name: env_syntax_check
        clss: "examples.Formal.scripts.formal_checkers.EnvSyntaxChecker"
        args:
          env_file: "{OUT}/tests/{DUT}_checker.sv"
      - name: wrapper_timing_check
        clss: "examples.Formal.scripts.formal_checkers.WrapperTimingChecker"
        args:
          wrapper_file: "{OUT}/tests/{DUT}_wrapper.sv"
          rtl_path: "{RTL_PATH}/{DUT}.v"
  - name: property_generation
    desc: "SVA 属性生成"
    task:
      - "目标：根据规划文档中的 `(Style: ...)` 标签，精准生成对应的 SVA 代码，并确保无遗漏。"
      - "第1步：读取 `{OUT}/03_{DUT}_functions_and_checks.md`，提取每一个 `<CK_...>` 检测点及其 `(Style: ...)` 标注。"
      - "第2步：为每个 CK 点编写 SVA 代码，每个属性的名称必须是 <CK_...> 形式，你需要先定义属性，然后在对这个属性进行操作。**必须严格遵守** `Guide_Doc/dut_property_template.md` 定义的风格模板 (Comb, Seq, Assume, Cover)。"
      - "第3步：**符号化验证增强**：对于涉及存储或多条目逻辑的功能，必须优先使用 `fv_idx` 和 `fv_mon_...` 信号。实现**单点修改保证**：断言当写入地址不等于 `fv_idx` 时，`fv_mon_` 数据必须保持稳定 ($stable)。"
      - "第4步：**【重要】符号化索引约束检查**：如果 wrapper 中定义了 fv_idx（即设计包含数组结构），必须在 checker 中添加以下三个强制约束以防止假阳性："
      - "  1. M_CK_FV_IDX_STABLE: assume property(@(posedge clk) disable iff(!rst_n) $stable(fv_idx));"
      - "  2. M_CK_FV_IDX_VALID:  assume property(@(posedge clk) fv_idx < NUM_PORTS);  // 注意：不使用 disable iff"
      - "  3. M_CK_FV_IDX_KNOWN:  assume property(@(posedge clk) !$isunknown(fv_idx));"
      - "  这些约束的模板已包含在 checker_template.sv 中，请根据实际情况取消注释并完善参数。"
      - "第5步：**防止证明无效 (Vacuity Check)**：为所有关键状态（Full, Empty, Hit 等）添加 `cover property`，证明环境约束没有剔除合法场景。"
      - "第6步：使用 EditTextFile 工具将代码写入 `{OUT}/tests//{DUT}_checker.sv`。"
      - "第7步：执行**风格合规性自检**：检查所有标记为 `Comb` 的属性中是否包含了时序操作符，并确保所有标签对应的断言已完整生成。"
    reference_files:
      - "{OUT}/03_{DUT}_functions_and_checks.md"
      - "{OUT}/tests/{DUT}_checker.sv"
      - "SpecDoc/dut_property_template.md"
    output_files:
      - "{OUT}/tests/{DUT}_checker.sv"
    checker:
      - name: property_structure_check
        clss: "examples.Formal.scripts.formal_checkers.PropertyStructureChecker"
        args:
          property_file: "{OUT}/tests/{DUT}_checker.sv"
          spec_file: "{OUT}/03_{DUT}_functions_and_checks.md"
  - name: script_generation
    desc: "验证脚本生成与全面验证"
    task:
      - "目标：生成并验证可执行的 FormalMC TCL 脚本。"
      - "关键指令：请务必使用工具 `GenerateFormalScript` 来生成 TCL 脚本，**严禁**使用 `EditTextFile` 或其他方式手动编写脚本文件。"
      - "第1步：调用 `GenerateFormalScript` 工具生成TCL脚本。工具参数说明："
      - "  - `dut_name`: 必须使用 `{DUT}` 作为模块名称"
      - "  - `checker_file`: checker文件路径，使用 `{OUT}/tests/{DUT}_checker.sv`"
      - "  - `output_file`: TCL脚本输出路径，使用 `{OUT}/tests/{DUT}_formal.tcl`"
      - "  - `rtl_dir`: RTL源码所在目录，使用 `{FILE_PATH}`"
      - "  **调用方式**：GenerateFormalScript(dut_name=\"{DUT}\", checker_file=\"{OUT}/tests/{DUT}_checker.sv\", output_file=\"{OUT}/tests/{DUT}_formal.tcl\", rtl_dir=\"{FILE_PATH}\")"
      - "  **说明**：工具会自动配置默认的时钟(clk)和复位(rst_n)信号，无需手动指定。"
      - "第2步：脚本生成后，立即使用 `Check` 工具。该阶段的 Checker 会自动调用 FormalMC 执行你生成的脚本，以验证其语法和基本可运行性。"
      - "第3步：如果 `Check` 失败，请根据错误信息调试并修复 SVA 文件或重新生成脚本，直到 `Check` 通过。"
      - "第4步：对于通过 `Check` 的脚本，你需要结合日志进行分析，确保所有属性均被正确验证，以及失败的属性被准确识别是RTL缺陷还是断言设计问题。"
    reference_files:
      - "{OUT}/tests/{DUT}_checker.sv"
      - "{OUT}/tests/avis.log"
      - "{OUT}/02_{DUT}_basic_info.md"
      - "{OUT}/03_{DUT}_functions_and_checks.md"
    output_files:
      - "{OUT}/tests/{DUT}_formal.tcl"
    checker:
      - name: script_generation_check
        clss: "examples.Formal.scripts.formal_checkers.ScriptGenerationChecker"
        args:
          dut_name: "{DUT}"
          property_file: "{OUT}/tests/{DUT}_checker.sv"
          spec_file: "{OUT}/03_{DUT}_functions_and_checks.md"
          script_file: "{OUT}/tests/{DUT}_formal.tcl"
          tcl_script: "{OUT}/tests/{DUT}_formal.tcl"

  - name: environment_debugging_iteration
    desc: "验证环境调试与迭代修复{MAX_ITERATION: 5}"
    task:
      - "目标：通过LLM人工分析，识别并修复**真正的验证环境问题**，确保环境约束正确。"
      - "**工作流程：手动分析 → 记录文档 → 修复环境 → 执行验证 → 更新状态**"
      - ""
      - "**第1步：创建/读取失败跟踪文档**"
      - "  文件路径：`{OUT}/tests/environment_issues_tracking.md`"
      - "  **首次运行**：如果文件不存在，创建文档并记录所有失败属性："
      - "    1. 读取 `{OUT}/tests/avis.log`，提取所有失败的属性（状态为 FAIL, TRIVIALLY_TRUE, UNREACHABLE 等）"
      - "    2. 为每个失败属性创建一条跟踪记录，格式如下："
      - "       ```"
      - "       ## [ENV-001] 属性名：CK_EXAMPLE_PROPERTY"
      - "       - **状态**：待分析"
      - "       - **失败类型**：TRIVIALLY_TRUE"
      - "       - **问题分类**：待定"
      - "       - **分析说明**：（待LLM分析）"
      - "       - **修复措施**：（待确定）"
      - "       ```"
      - "  **后续运行**：如果文件已存在，直接读取继续处理"
      - ""
      - "**第2步：LLM人工分析每个待处理属性**"
      - "  对于每个 **状态=待分析** 或 **状态=待修复** 的记录："
      - "    1. **深入分析失败原因**："
      - "       - 读取 `{OUT}/tests/avis.log` 中该属性的详细失败信息"
      - "       - 读取 `{OUT}/tests/{DUT}_checker.sv` 查看属性定义"
      - "       - 读取 `{OUT}/tests/{DUT}_wrapper.sv` 查看环境配置"
      - "       - 分析RTL源码 `{RTL_PATH}/{DUT}.v` 理解设计意图"
      - "    2. **判断问题类型**（这是最关键的步骤）："
      - "       - **环境问题**：过强的assume约束、缺少必要的输入约束、fv_idx配置错误、wrapper信号映射缺失"
      - "       - **RTL缺陷**：设计逻辑错误、状态不可达、时序违反"
      - "       - **Cover失败**：通常是RTL设计问题导致状态不可达，不属于环境问题"
      - "    3. **更新跟踪文档**："
      - "       - 如果是**环境问题**：将 **问题分类** 改为 `环境问题`，**状态** 改为 `待修复`，填写详细的 **分析说明**"
      - "       - 如果是**RTL缺陷**：将 **问题分类** 改为 `RTL缺陷`，**状态** 改为 `已分类`（不在本阶段修复）"
      - ""
      - "**第3步：修复环境问题**"
      - "  对于所有 **问题分类=环境问题** 且 **状态=待修复** 的记录："
      - "    1. 根据分析结果修改验证环境文件："
      - "       - 修改 `{OUT}/tests/{DUT}_checker.sv`：调整assume约束、删除错误属性"
      - "       - 修改 `{OUT}/tests/{DUT}_wrapper.sv`：补全信号映射、修正fv_idx逻辑"
      - "    2. 在跟踪文档的 **修复措施** 字段记录你的修改内容"
      - ""
      - "**第4步：运行验证并检查修复效果**"
      - "  1. 调用 Check 工具，EnvironmentDebuggingChecker 会："
      - "     - 检查跟踪文档是否存在且格式正确"
      - "     - 执行TCL脚本生成新的验证日志"
      - "  2. 检查日志文件：`{OUT}/tests/avis.log`"
      - "     - 对于每个 **状态=待修复** 的环境问题记录："
      - "       - 如果该属性在新日志中已通过（PASS）：将 **状态** 改为 `已修复`"
      - "       - 如果该属性仍然失败：保持 **状态=待修复**，重新分析原因并调整修复策略"
      - "  3. 如果有新的失败属性出现，添加到跟踪文档并从第2步重新开始分析"
      - "  4. 重复步骤2-5，直到所有环境问题都被修复或达到迭代上限（{MAX_ITERATION}次）"
      - ""
      - "**重要提示**："
      - "  - Cover失败通常不是环境问题，应归类为RTL缺陷"
      - "  - TRIVIALLY_TRUE需要检查属性是否真的存在于代码中（未被注释）"
      - "  - 环境问题的典型特征：约束过强、信号映射错误、fv_idx配置问题"
      - "  - 所有分析过程和决策依据都要详细记录在跟踪文档中"
    reference_files:
      - "{OUT}/tests/avis.log"
      - "{OUT}/tests/{DUT}_checker.sv"
      - "{OUT}/tests/{DUT}_wrapper.sv"
      - "{OUT}/03_{DUT}_functions_and_checks.md"
      - "{RTL_PATH}/{DUT}.v"
    output_files:
      - "{OUT}/tests/environment_issues_tracking.md"
    checker:
      - name: environment_debugging_check
        clss: "examples.Formal.scripts.formal_checkers.EnvironmentDebuggingChecker"
        args:
          dut_name: "{DUT}"
          property_file: "{OUT}/tests/{DUT}_checker.sv"
          spec_file: "{OUT}/03_{DUT}_functions_and_checks.md"
          log_file: "{OUT}/tests/avis.log"
          checker_file: "{OUT}/tests/{DUT}_checker.sv"
          tcl_script: "{OUT}/tests/{DUT}_formal.tcl"

  - name: formal_execution
    desc: "RTL缺陷分析与报告"
    task:
      - "目标：为经过环境调试后**确认的RTL缺陷**创建准确、详细的BUG报告。"
      - "**前提条件**：本阶段假设验证环境已经过充分调试（通过 environment_debugging_iteration 阶段），所有失败属性均为真实RTL问题。"
      - "**第1步：从跟踪文档提取RTL缺陷列表**"
      - "  1. 读取 `{OUT}/tests/environment_issues_tracking.md`"
      - "  2. 提取所有 **问题分类=RTL缺陷** 的属性记录"
      - "  3. 这些属性就是需要在BUG报告中详细分析的对象"
      - "  4. 注意：只有 **问题分类=RTL缺陷** 的属性才需要写入bug report，环境问题不应出现在报告中"
      - "**第2步：创建BUG报告**"
      - "  在 `{OUT}/04_{DUT}_bug_report.md` 文件中**为每个RTL缺陷**创建独立章节"
      - "  使用格式：## Failed Property: `A_CK_XXX`"
      - "  准确记录失败属性的名称和它对应的 CK 标签（从 `{OUT}/tests/{DUT}_checker.sv` 获取）"
      - "**第3步：深度分析每个RTL缺陷**"
      - "  对每一个RTL缺陷，结合 RTL 源码和反例（CEX），提供："
      - "  - **失败属性**：属性名称和对应的 CK 标签"
      - "  - **根本原因**：结合 RTL 代码逻辑，深入分析为什么会失败"
      - "  - **代码定位**：指出 RTL 中具体的缺陷位置（文件名、行号）"
      - "  - **概念性反例 (CEX)**：描述导致失败的输入序列和状态转换"
      - "  - **预期行为**：根据设计规格，正确的行为应该是什么"
      - "  - **实际行为**：当前 RTL 实际表现出的错误行为"
      - "  - **修复建议**：提供具体的代码修改建议，包括伪代码或关键逻辑"
      - "**第4步：添加环境调试摘要**"
      - "  在报告开头添加 **环境调试摘要** 章节，说明："
      - "  - 迭代修复的环境问题数量和类型"
      - "  - 修复后的环境质量指标"
      - "  - 最终确认的RTL缺陷数量"
      - "**第5步：验证报告一致性**"
      - "  使用 BugReportConsistencyChecker 验证报告准确性"
      - "  确保所有日志中的 RTL 缺陷都被记录，且分析深入、修复建议可行"
      - "**注意**：如果发现某个失败可能是环境问题，应返回 environment_debugging_iteration 阶段修复，而不是写入BUG报告"
    reference_files:
      - "{OUT}/tests/avis.log"
      - "{OUT}/tests/{DUT}_checker.sv"
      - "{DUT}/README.md"
      - "{OUT}/tests/environment_issues_tracking.md"
      - "{RTL_PATH}/*.v"
      - "{RTL_PATH}/*.sv"
    output_files:
      - "{OUT}/04_{DUT}_bug_report.md"
    checker:
      - name: bug_report_consistency_check
        clss: "examples.Formal.scripts.formal_checkers.BugReportConsistencyChecker"
        args:
          dut_name: "{DUT}"
          property_file: "{OUT}/tests/{DUT}_checker.sv"
          bug_report_file: "{OUT}/04_{DUT}_bug_report.md"
          log_file: "{OUT}/tests/avis.log"
          tracking_doc: "{OUT}/tests/environment_issues_tracking.md"
  - name: verification_review_and_summary
    desc: "验证总结与审查"
    task:
      - "目标：对整个形式化验证过程进行审查和总结，确保验证的完备性和高质量。"
      - "第1步：回顾验证规划 `{OUT}/01_{DUT}_verification_needs_and_plan.md`，确认所有最初的目标是否已经达成。"
      - "第2步：审查最终的SVA属性文件 `{OUT}/tests/{DUT}_checker.sv`，评估属性的质量、可读性和对设计规格的覆盖是否全面。"
      - "第3步：如果生成了BUG报告 `{OUT}/04_{DUT}_bug_report.md`，请审查其中的反例（CEX）分析是否深入、根本原因是否明确、修复建议是否合理。"
      - "第4步：编写一份完整的验证总结报告 `{OUT}/05_{DUT}_formal_summary.md`。内容应包括：验证范围、使用的关键属性、发现的设计问题、最终的属性状态（通过/失败/未定），以及对整个验证过程的评估和思考。"
      - "第5步：完成总结报告后，调用 `Check` 工具，等待人工审核确认最终的验证质量。"
    reference_files:
      - "{OUT}/01_{DUT}_verification_needs_and_plan.md"
      - "{OUT}/03_{DUT}_functions_and_checks.md"
      - "{OUT}/tests/{DUT}_checker.sv"
      - "{OUT}/tests/avis.log"
      - "{OUT}/04_{DUT}_bug_report.md"
    output_files:
      - "{OUT}/05_{DUT}_formal_summary.md"
    checker:
      - name: human_check_formal_summary
        clss: "HumanChecker"

