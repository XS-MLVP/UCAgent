<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UCAgent Sub Workspaces</title>
<link rel="icon" type="image/svg+xml" href="/static/share/ucagent-favicon.svg">
<link rel="stylesheet" href="/static/share/ucagent-shell.css">
<style>
:root{--bg:#0f1117;--bg2:#1a1d25;--bg3:#22262f;--bg4:#2a2e3a;
      --border:#2e3340;--text:#c8cdd6;--text-dim:#6b7280;--text-bright:#e8ecf2;
      --accent:#4f8ef7;--accent2:#2d5cb8;--green:#36d399;--red:#f87272;
      --yellow:#fbbd23;--orange:#f97316;--radius:6px;--mono:'Consolas','Menlo',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;padding-bottom:var(--uc-footer-height,32px)}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
#hdr{display:flex;align-items:center;padding:0 16px;min-height:48px;background:var(--bg2);border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap}
#hdr .logo{font-weight:700;font-size:16px;color:var(--text-bright);letter-spacing:.5px}
#hdr .logo span{color:var(--accent)}
#status-line{font-size:12px;color:var(--text-dim);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:520px}
.sep{flex:1}
.hdr-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.header-toggle{display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);font-size:12px;cursor:pointer;white-space:nowrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:var(--radius);cursor:pointer;font-size:12px;line-height:1.4;text-decoration:none;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}
.btn.primary{background:var(--accent2);border-color:var(--accent2);color:#fff}
.btn.primary:hover{background:var(--accent);color:#fff}
.btn.danger{background:none;border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:var(--red);color:#fff}
.btn:disabled{opacity:.45;cursor:not-allowed}
main{padding:22px 24px;max-width:1600px}
.stats{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:12px;margin-bottom:18px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat .label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.stat .value{font-size:24px;font-weight:700;color:var(--text-bright)}
.stat.total .value{color:var(--accent)}.stat.running .value{color:var(--green)}
.stat.completed .value{color:var(--accent)}.stat.exited .value{color:var(--red)}
.stat.waiting .value{color:var(--yellow)}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.input,.select{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:13px;outline:none}
.input{min-width:220px;max-width:360px;flex:1}.input:focus,.select:focus{border-color:var(--accent)}
.pager{display:flex;align-items:center;gap:8px;margin-left:auto;color:var(--text-dim);font-size:12px;flex-wrap:wrap}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:auto}
table{width:100%;border-collapse:collapse;min-width:1120px}
th{background:var(--bg3);color:var(--text-dim);font-size:10px;text-transform:uppercase;letter-spacing:.7px;text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
tbody tr:hover td{background:var(--bg3)}
tbody tr:last-child td{border-bottom:none}
.path-cell{font-family:var(--mono);font-size:12px;max-width:260px;display:inline-block;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}
.mission-cell,.stage-cell{max-width:220px;display:inline-block;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}
.time-cell{font-family:var(--mono);font-size:11px;color:var(--text-dim)}
.muted{color:var(--text-dim)}
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:2px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.badge.running{background:color-mix(in srgb,var(--green) 18%,transparent);color:var(--green)}
.badge.waiting{background:color-mix(in srgb,var(--yellow) 18%,transparent);color:var(--yellow)}
.badge.completed{background:color-mix(in srgb,var(--accent) 18%,transparent);color:var(--accent)}
.badge.exited{background:color-mix(in srgb,var(--red) 18%,transparent);color:var(--red)}
.progress-wrap{display:flex;align-items:center;gap:8px;min-width:130px}
.progress-track{height:6px;background:var(--bg);border-radius:999px;overflow:hidden;width:82px;border:1px solid rgba(255,255,255,.04)}
.progress-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .2s}
.progress-text{font-family:var(--mono);font-size:11px;color:var(--text-dim);min-width:42px}
.actions{display:flex;gap:6px;align-items:center}
.empty{padding:44px;text-align:center;color:var(--text-dim);font-style:italic}
#toast{position:fixed;right:22px;bottom:22px;display:flex;flex-direction:column;gap:8px;z-index:20}
.toast{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:var(--radius);padding:9px 13px;min-width:220px;max-width:460px;box-shadow:0 8px 24px rgba(0,0,0,.35);font-size:13px}
.toast.err{border-left-color:var(--red)}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.68);display:none;align-items:center;justify-content:center;padding:20px;z-index:30}
.modal-backdrop.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:480px;max-width:96vw;box-shadow:0 18px 60px rgba(0,0,0,.45)}
.modal-hdr{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);gap:8px}
.modal-hdr h2{font-size:14px;color:var(--text-bright);flex:1}
.modal-body{padding:16px;line-height:1.6;color:var(--text)}
.modal-body b{color:var(--red);font-family:var(--mono);word-break:break-all}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:11px 16px;border-top:1px solid var(--border)}
@media(max-width:860px){
  main{padding:14px 12px}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}
  #status-line{width:100%;max-width:none}.pager{margin-left:0;width:100%}
  .toolbar{align-items:stretch}.input,.select{max-width:none;width:100%}
}
</style>
</head>
<body>
<header id="hdr">
  <div class="logo uc-shell-brand"><span class="uc-shell-brand-mark">UC</span><span>UC<span>Agent</span> Complete</span></div>
  <div id="status-line">Loading...</div>
  <div class="sep"></div>
  <div class="hdr-actions" id="uc-shell-header-actions">
    <a id="master-btn" class="btn" href="/" style="display:none">Master</a>
    <a id="agent-btn" class="btn" href="/">Agent</a>
    <label class="header-toggle" title="Display delete controls">
      <input type="checkbox" id="show-delete-controls" style="accent-color:var(--accent)"> Show delete
    </label>
    <button class="btn" onclick="refreshNow()">Refresh</button>
  </div>
</header>
<main>
  <section class="stats">
    <div class="stat total"><div class="label">Total</div><div class="value" id="stat-total">-</div></div>
    <div class="stat running"><div class="label">Running</div><div class="value" id="stat-running">-</div></div>
    <div class="stat waiting"><div class="label">Waiting</div><div class="value" id="stat-waiting">-</div></div>
    <div class="stat completed"><div class="label">Completed</div><div class="value" id="stat-completed">-</div></div>
    <div class="stat exited"><div class="label">Exited</div><div class="value" id="stat-exited">-</div></div>
  </section>
  <section class="toolbar">
    <input id="search-box" class="input" type="search" placeholder="Filter by path / mission / stage" oninput="onSearchInput()">
    <select id="state-filter" class="select" onchange="onFilterChange()">
      <option value="all">All states</option>
      <option value="running">Running</option>
      <option value="waiting">Waiting</option>
      <option value="completed">Completed</option>
      <option value="exited">Exited</option>
    </select>
    <select id="sort-by" class="select" onchange="onSortChange()">
      <option value="info_mtime">Sort: modified</option>
      <option value="info_ctime">Sort: created</option>
      <option value="path">Sort: path</option>
      <option value="mission_name">Sort: mission</option>
      <option value="progress_percent">Sort: progress</option>
      <option value="lifecycle">Sort: state</option>
    </select>
    <button id="sort-order" class="btn" onclick="toggleSortOrder()">Desc</button>
    <div class="pager">
      <span>Per page</span>
      <select id="page-size" class="select" onchange="onPageSizeChange()">
        <option value="10">10</option>
        <option value="20" selected>20</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
      <span id="page-info">-</span>
      <button id="prev-btn" class="btn" onclick="prevPage()">Prev</button>
      <span id="page-num">0/0</span>
      <button id="next-btn" class="btn" onclick="nextPage()">Next</button>
    </div>
  </section>
  <section class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Path</th>
          <th>Mission</th>
          <th>State</th>
          <th>Progress</th>
          <th>Current Stage</th>
          <th>Created</th>
          <th>Modified</th>
          <th>Run Time</th>
          <th>Exit</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="workspace-body">
        <tr><td colspan="10" class="empty">Loading...</td></tr>
      </tbody>
    </table>
  </section>
</main>
<footer id="uc-shell-footer" class="uc-shell-footer"></footer>
<div id="toast"></div>
<div id="delete-modal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-hdr"><h2>Delete Sub Workspace</h2><button class="btn" onclick="closeDeleteModal()">Close</button></div>
    <div class="modal-body">
      <div>Delete <b id="delete-path"></b>?</div>
      <div class="muted" id="delete-note" style="margin-top:8px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn danger" id="delete-confirm" onclick="deleteSelected()">Delete</button>
    </div>
  </div>
</div>
<script>
"use strict";
let _page=1;
let _pageSize=20;
let _totalPages=0;
let _sortBy="info_mtime";
let _sortDesc=true;
let _searchTimer=null;
let _deletePath="";
let _lastRows=[];
let _agentProxyBase="";
let _showDeleteControls=false;
const _SHOW_DELETE_KEY="ucagent-complete-show-delete-controls";

function qs(s){return document.querySelector(s)}
function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function jsq(s){return String(s??"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\r?\n/g," ")}
function toast(msg,ok=true){
  const box=document.createElement("div");
  box.className="toast"+(ok?"":" err");
  box.textContent=msg;
  qs("#toast").appendChild(box);
  setTimeout(()=>box.remove(),3600);
}
function updateDeleteControlsUi(){
  const cb=qs("#show-delete-controls");
  if(cb)cb.checked=_showDeleteControls;
}
function requireDeleteControls(){
  if(_showDeleteControls)return true;
  toast("Enable Show delete first",false);
  return false;
}
function _isLocalHost(host){
  const h=String(host||"").toLowerCase();
  return !h||h==="localhost"||h==="127.0.0.1"||h==="0.0.0.0"||h==="::1"||h==="[::1]";
}
function _dashboardBasePath(){
  const p=window.location.pathname;
  let base="/";
  if(p.endsWith("complete/"))base=p.slice(0,-"complete/".length);
  else if(p.endsWith("complete"))base=p.slice(0,-"complete".length);
  return base||"/";
}
function _dashboardUrl(subPath){
  const u=new URL(_agentProxyBase||_dashboardBasePath(),window.location.origin);
  const sub=String(subPath||"").replace(/^\/+|\/+$/g,"");
  if(sub)u.searchParams.set("sub_worspace",sub);
  return _agentProxyBase?(u.origin+u.pathname+u.search):(u.pathname+u.search);
}
function _isMasterProxyPath(){
  return /^\/(?:agent|task)\/[^/]+\/cmd(?:\/|$)/.test(window.location.pathname);
}
function _masterUrlFromInfo(master){
  if(!master)return "";
  if(master.tcp&&master.port){
    const host=_isLocalHost(master.host)?window.location.hostname:master.host;
    return window.location.protocol+"//"+host+":"+master.port+"/";
  }
  const raw=String(master.url||"").split("|")[0].trim();
  return raw.startsWith("http")?raw:"";
}
async function initNav(){
  qs("#agent-btn").href=_dashboardUrl("");
  const masterBtn=qs("#master-btn");
  if(_isMasterProxyPath()){
    masterBtn.href="/";
    masterBtn.style.display="";
    return;
  }
  try{
    const r=await fetch("/api/server_info");
    const j=await r.json();
    const url=_masterUrlFromInfo(j.data&&j.data.master_api);
    if(url){
      masterBtn.href=url;
      masterBtn.style.display="";
      _agentProxyBase=url.replace(/\/$/,"")+"/agent/self/cmd/";
      qs("#agent-btn").href=_dashboardUrl("");
    }
  }catch(e){}
}
function _stateBadge(state){
  const label={running:"Running",waiting:"Waiting",completed:"Completed",exited:"Exited"}[state]||state||"Unknown";
  const cls=["running","waiting","completed","exited"].includes(state)?state:"exited";
  return `<span class="badge ${cls}">${esc(label)}</span>`;
}
function _boolText(v){return v?"yes":"no"}
function _renderProgress(row){
  const pct=Math.max(0,Math.min(100,Number(row.progress_percent||0)));
  return `<div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><span class="progress-text">${esc(row.progress_label||"-")}</span></div>`;
}
function _setStats(summary){
  const counts=summary.state_counts||{};
  qs("#stat-total").textContent=summary.total??0;
  qs("#stat-running").textContent=counts.running||0;
  qs("#stat-waiting").textContent=counts.waiting||0;
  qs("#stat-completed").textContent=counts.completed||0;
  qs("#stat-exited").textContent=counts.exited||0;
}
function _renderRows(rows){
  const body=qs("#workspace-body");
  if(!rows.length){
    body.innerHTML='<tr><td colspan="10" class="empty">No sub workspaces found.</td></tr>';
    return;
  }
  body.innerHTML=rows.map(row=>{
    const openUrl=_dashboardUrl(row.path);
    const deleteTitle=row.lifecycle==="running"?"Delete running sub workspace":"Delete sub workspace";
    const deleteAction=_showDeleteControls
      ? `<button class="btn danger" title="${esc(deleteTitle)}" onclick="confirmDelete('${jsq(row.path)}')">Delete</button>`
      : "";
    return `<tr>
      <td><span class="path-cell" title="${esc(row.path)}">${esc(row.path||row.name||"-")}</span></td>
      <td><span class="mission-cell" title="${esc(row.mission_name)}">${esc(row.mission_name||"-")}</span></td>
      <td>${_stateBadge(row.lifecycle)}</td>
      <td>${_renderProgress(row)}</td>
      <td><span class="stage-cell" title="${esc(row.current_stage_name)}">${esc(row.current_stage_name||"-")}</span></td>
      <td class="time-cell">${esc(row.info_ctime_str||"-")}</td>
      <td class="time-cell">${esc(row.info_mtime_str||"-")}</td>
      <td class="time-cell">${esc(row.run_time||"-")}</td>
      <td>${_boolText(row.is_agent_exit)}</td>
      <td><div class="actions">
        <a class="btn primary" href="${esc(openUrl)}" target="_blank">Open</a>
        ${deleteAction}
      </div></td>
    </tr>`;
  }).join("");
}
function _updatePager(summary){
  _page=summary.page||1;
  _totalPages=summary.total_pages||0;
  const total=summary.filtered??0;
  const start=total?((_page-1)*_pageSize+1):0;
  const end=Math.min(_page*_pageSize,total);
  qs("#page-info").textContent=total?`${start}-${end} of ${total}`:"-";
  qs("#page-num").textContent=_totalPages?`${_page}/${_totalPages}`:"0/0";
  qs("#prev-btn").disabled=_page<=1;
  qs("#next-btn").disabled=!_totalPages||_page>=_totalPages;
  const current=summary.current_workspace_path||".";
  qs("#status-line").textContent=`${summary.filtered||0} shown / ${summary.total||0} total, depth ${summary.max_depth||2}, workspace ${current||"."}`;
}
async function loadWorkspaces(){
  const params=new URLSearchParams();
  params.set("page",String(_page));
  params.set("page_size",String(_pageSize));
  params.set("sort_by",_sortBy);
  params.set("sort_desc",_sortDesc?"true":"false");
  params.set("q",qs("#search-box").value.trim());
  params.set("state",qs("#state-filter").value);
  qs("#workspace-body").innerHTML='<tr><td colspan="10" class="empty">Loading...</td></tr>';
  try{
    const r=await fetch("/api/sub_workspaces?"+params.toString());
    const j=await r.json().catch(()=>({status:"error",detail:"Non-JSON response"}));
    if(!r.ok||j.status!=="ok")throw new Error(j.detail||j.message||"Request failed");
    const summary=j.summary||{};
    _lastRows=j.data||[];
    _setStats(summary);
    _renderRows(_lastRows);
    _updatePager(summary);
  }catch(e){
    qs("#workspace-body").innerHTML=`<tr><td colspan="10" class="empty">${esc(e.message)}</td></tr>`;
    qs("#status-line").textContent="Load failed";
    toast(e.message,false);
  }
}
function refreshNow(){loadWorkspaces()}
function onSearchInput(){
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(()=>{_page=1;loadWorkspaces();},220);
}
function onFilterChange(){_page=1;loadWorkspaces()}
function onSortChange(){_sortBy=qs("#sort-by").value;_page=1;loadWorkspaces()}
function toggleSortOrder(){
  _sortDesc=!_sortDesc;
  qs("#sort-order").textContent=_sortDesc?"Desc":"Asc";
  _page=1;
  loadWorkspaces();
}
function onPageSizeChange(){
  _pageSize=parseInt(qs("#page-size").value,10)||20;
  _page=1;
  loadWorkspaces();
}
function prevPage(){if(_page>1){_page--;loadWorkspaces()}}
function nextPage(){if(_totalPages&&_page<_totalPages){_page++;loadWorkspaces()}}
function confirmDelete(path){
  if(!requireDeleteControls())return;
  _deletePath=path;
  const row=_lastRows.find(item=>item.path===path)||{};
  qs("#delete-path").textContent=path;
  const extra=row.lifecycle==="running"?"This sub workspace is marked as running. ":"";
  qs("#delete-note").textContent=extra+"Parent directories that are not UCAgent workspaces will also be removed when they contain no other sub workspace.";
  qs("#delete-modal").classList.add("open");
}
function closeDeleteModal(){
  qs("#delete-modal").classList.remove("open");
  _deletePath="";
}
async function deleteSelected(){
  if(!requireDeleteControls())return;
  if(!_deletePath)return;
  const btn=qs("#delete-confirm");
  btn.disabled=true;
  try{
    const r=await fetch("/api/sub_workspace?path="+encodeURIComponent(_deletePath),{method:"DELETE"});
    const j=await r.json().catch(()=>({status:"error",detail:"Non-JSON response"}));
    if(!r.ok||j.status!=="ok")throw new Error(j.detail||j.message||"Delete failed");
    closeDeleteModal();
    const cleaned=(j.data&&j.data.cleaned_parent_paths||[]).length;
    toast(cleaned?`Deleted workspace and ${cleaned} parent path(s)`:"Deleted workspace");
    loadWorkspaces();
  }catch(e){
    toast(e.message,false);
  }finally{
    btn.disabled=false;
  }
}
qs("#show-delete-controls").addEventListener("change",e=>{
  _showDeleteControls=e.target.checked;
  try{localStorage.setItem(_SHOW_DELETE_KEY,_showDeleteControls?"1":"0");}catch(err){}
  _renderRows(_lastRows);
});
try{_showDeleteControls=localStorage.getItem(_SHOW_DELETE_KEY)==="1";}catch(e){}
updateDeleteControlsUi();
initNav().finally(loadWorkspaces);
</script>
<script src="/static/share/ucagent-shell.js"></script>
<script>
window.UCAgentShell.init({actionsSelector:"#uc-shell-header-actions",metaUrl:"/api/ui-meta",fixedFooter:true});
</script>
</body>
</html>
