name: build-pandoc-pdf

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    # 使用公共 pandoc+LaTeX 基础镜像；后续步骤中补充中文与 crossref 依赖
    container:
      image: docker.io/pandoc/latex:3.6.4-ubuntu
    steps:
      - name: Install git, LaTeX extras, fonts, and pandoc-crossref
        run: |
          set -eux
          apt-get update
          # 基础工具与字体（Noto CJK 字体满足中文主字体需求）
          apt-get install -y --no-install-recommends \
            fonts-noto-cjk wget xz-utils make git ca-certificates

          # 优先使用 tlmgr 安装 ctex（保证 ctexart.cls 可用，与镜像自带 TeX Live 一致）
          if command -v tlmgr >/dev/null 2>&1; then
            tlmgr option repository http://mirror.ctan.org/systems/texlive/tlnet
            tlmgr update --self
            tlmgr install ctex
          else
            # 兜底方案（不推荐）：通过 apt 安装中文支持
            apt-get install -y --no-install-recommends texlive-lang-chinese
          fi

          # 安装 pandoc-crossref（与 pandoc 3.6.x 兼容）
          CROSSREF_VERSION=0.3.17.0
          wget -q https://github.com/lierdakil/pandoc-crossref/releases/download/v${CROSSREF_VERSION}/pandoc-crossref-Linux.tar.xz
          tar -xf pandoc-crossref-Linux.tar.xz
          mv pandoc-crossref /usr/local/bin/
          fc-cache -fv || true
          pandoc --version
          pandoc-crossref --version || true
          fc-list | grep -i "Noto" | head -n 5 || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Build PDF (oneside)
        env:
          HOME: /root
        run: |
          git config --global --add safe.directory $(pwd)
          make pdf-one

      - name: Build PDF (twoside)
        env:
          HOME: /root
        run: |
          git config --global --add safe.directory $(pwd)
          make pdf-one TWOSIDE=1

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: ucagent-doc
          path: |
            ucagent-doc.pdf
            ucagent-doc-twoside.pdf
